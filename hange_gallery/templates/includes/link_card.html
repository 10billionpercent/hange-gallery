{% load wagtailimages_tags %}

<div class="{{ variant }}">
    <a href="{{ art.url }}" target="_blank">
{% if variant == "carousel-card" %}

{% endif %}

        <div class="art-title">
            <h4> {{ art.title }}</h4>
        </div>
    </a>
</div>
